services:
  - type: web
    name: neon-arcade
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_DOMAIN_VERIFICATION_TOKEN
        sync: false
